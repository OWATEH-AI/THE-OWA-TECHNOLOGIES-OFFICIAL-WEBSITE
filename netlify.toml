# ============================================================
# OWA TECHNOLOGIES — NETLIFY DEPLOYMENT CONFIGURATION
# ============================================================

[build]
  # Command to build the project
  command = "npm run build"
  # Directory to publish (Vite output)
  publish = "dist"
  # Node version
  environment = { NODE_VERSION = "20" }

# SPA redirect: all routes serve index.html (React Router support)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# HTTP security headers — world-class security posture
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Disable content sniffing
    X-Content-Type-Options = "nosniff"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Permissions policy — minimal footprint
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-ancestors 'none';"

# Cache static assets aggressively (Vite hashes filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Environment context — production optimizations
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"
