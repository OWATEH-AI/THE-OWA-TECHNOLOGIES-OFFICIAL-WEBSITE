  <!-- Micro-interactions: Scroll Progress + Cursor Glow -->
  <script>
    // Scroll progress indicator
    (function () {
      const bar = document.getElementById('scroll-progress');
      if (!bar) return;
      const update = () => {
        const docH = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
        bar.style.width = pct + '%';
      };
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();

    // Cursor glow (desktop only)
    (function () {
      if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
        const glow = document.getElementById('cursor-glow');
        if (!glow) return;
        let ax = window.innerWidth / 2, ay = window.innerHeight / 2;
        let cx = ax, cy = ay;
        let raf;
        document.addEventListener('mousemove', (e) => {
          ax = e.clientX; ay = e.clientY;
        }, { passive: true });
        const lerp = (a, b, t) => a + (b - a) * t;
        const animate = () => {
          cx = lerp(cx, ax, 0.08);
          cy = lerp(cy, ay, 0.08);
          glow.style.left = cx + 'px';
          glow.style.top = cy + 'px';
          raf = requestAnimationFrame(animate);
        };
        animate();
      }
    })();

    // Ripple effect on buttons
    document.addEventListener('click', function (e) {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      const r = Math.max(rect.width, rect.height);
      const span = document.createElement('span');
      span.className = 'ripple-effect';
      span.style.cssText = `width:${r}px;height:${r}px;left:${e.clientX - rect.left - r / 2}px;top:${e.clientY - rect.top - r / 2}px`;
      btn.appendChild(span);
      setTimeout(() => span.remove(), 700);
    });

    // Intersection Observer for Scroll Reveals
    (function () {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
            // Once revealed, we can stop observing
            // observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

      const setupReveal = () => {
        document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
      };

      // Run on load and after short delay for dynamic content
      setupReveal();
      setTimeout(setupReveal, 1000);

      // Also observe changes to DOM for SPA navigation
      const domObserver = new MutationObserver(setupReveal);
      domObserver.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
